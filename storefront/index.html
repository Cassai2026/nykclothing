<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYK CLOTHING | Sovereign Drop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#fafafa] text-black antialiased relative min-h-screen pb-20">

    <div class="bg-black text-white text-[11px] font-semibold tracking-[0.2em] uppercase py-2 text-center">
        Limited Edition Release // Global Shipping Available
    </div>

    <nav class="sticky top-0 z-40 bg-white/80 backdrop-blur-md border-b border-gray-100 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-[0.3em] uppercase cursor-pointer">NYK CLOTHING</h1>
            <div class="flex items-center space-x-6 text-sm font-medium">
                <button id="open-cart-btn" class="relative group p-2 flex items-center space-x-1">
                    <span class="tracking-widest uppercase text-xs font-semibold group-hover:text-neutral-500 transition-colors">Bag</span>
                    <span id="cart-count" class="bg-black text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="max-w-7xl mx-auto px-6 pt-16 pb-12">
        <div class="border-l-2 border-black pl-4">
            <h2 class="text-xs font-bold tracking-[0.4em] uppercase text-neutral-400 mb-1">Current Drop</h2>
            <h3 class="text-3xl font-extrabold tracking-tight uppercase sm:text-4xl">The Sovereign Collection</h3>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6">
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-x-6 gap-y-12">
            <div class="col-span-full py-20 flex flex-col items-center justify-center space-y-3">
                <div class="w-6 h-6 border-2 border-black border-t-transparent rounded-full animate-spin"></div>
                <p class="text-xs font-semibold tracking-widest text-neutral-400 uppercase">Accessing Core Vault...</p>
            </div>
        </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-0 z-50 pointer-events-none overflow-hidden hidden" aria-labelledby="slide-over-title" role="dialog" aria-modal="true">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm transition-opacity opacity-0" id="cart-overlay"></div>
        <div class="absolute inset-y-0 right-0 max-w-full flex pl-10">
            <div class="w-screen max-w-md pointer-events-auto transform translate-x-full transition-transform duration-300 ease-in-out" id="cart-panel">
                <div class="h-full flex flex-col bg-white shadow-2xl border-l border-neutral-100">
                    <div class="flex-1 py-6 overflow-y-auto px-4 sm:px-6">
                        <div class="flex items-start justify-between border-b border-neutral-100 pb-5">
                            <h2 class="text-sm font-bold tracking-widest uppercase text-black">Your Selection</h2>
                            <button id="close-cart-btn" class="text-neutral-400 hover:text-black transition-colors text-xs font-bold tracking-wider uppercase">Close</button>
                        </div>
                        <div class="mt-8">
                            <div class="flow-root">
                                <ul id="cart-items-list" role="list" class="-my-6 divide-y divide-neutral-100"></ul>
                            </div>
                        </div>
                    </div>
                    <div class="border-t border-neutral-100 py-6 px-4 sm:px-6 bg-neutral-50">
                        <div class="flex justify-between text-base font-medium text-black">
                            <p class="text-xs font-bold tracking-widest uppercase">Estimated Total</p>
                            <p id="cart-total-price" class="font-bold text-lg">Ł0.00</p>
                        </div>
                        <p class="mt-0.5 text-xs text-neutral-400 tracking-wide">Shipping and security taxes calculated at gateway.</p>
                        <div class="mt-6">
                            <button id="checkout-btn" class="w-full flex items-center justify-center bg-black border border-transparent text-white px-6 py-4 text-xs font-bold tracking-[0.2em] uppercase hover:bg-neutral-800 transition-all shadow-md">
                                Secure Checkout Via Stripe
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
