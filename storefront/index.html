<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYK CLOTHING | Circular Luxury</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background-color: #fafafa; }
    </style>
</head>
<body class="text-black antialiased overflow-x-hidden">

    <nav class="fixed top-0 left-0 w-full z-40 bg-white/80 backdrop-blur-md border-b border-neutral-200/60 px-6 py-4 flex justify-between items-center">
        <a href="#" class="text-sm font-bold uppercase tracking-[0.3em]">NYK CLOTHING</a>
        <div class="flex items-center space-x-6 text-[11px] font-bold uppercase tracking-widest">
            <button id="open-auth-btn" class="hover:text-neutral-500 transition-colors">Identity</button>
            <button id="open-closet-btn" class="hover:text-neutral-500 transition-colors hidden">Closet</button>
            <button id="open-cart-btn" class="hover:text-neutral-500 transition-colors">Bag (<span id="cart-count">0</span>)</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-24">
        <div class="mb-12 flex justify-between items-end border-b border-neutral-200 pb-4">
            <div>
                <h2 class="text-xs uppercase tracking-[0.2em] text-neutral-400 font-bold">Collections</h2>
                <h3 id="catalog-title" class="text-lg font-bold uppercase mt-1">Core Silhouettes</h3>
            </div>
            <button id="ghost-vault-trigger" class="text-[10px] bg-neutral-900 text-white font-bold tracking-widest uppercase px-4 py-2 hover:bg-black hidden transition-all">
                Reveal Ghost Vault
            </button>
        </div>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-6 gap-y-12">
            </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-0 z-50 hidden">
        <div id="cart-overlay" class="absolute inset-0 bg-black/40 opacity-0 transition-opacity duration-300"></div>
        <div id="cart-panel" class="absolute right-0 top-0 w-full max-w-md h-full bg-white shadow-2xl p-6 flex flex-col translate-x-full transition-transform duration-300">
            <div class="flex justify-between items-center border-b border-neutral-100 pb-4">
                <h3 class="text-xs font-bold uppercase tracking-widest">Your Bag</h3>
                <button id="close-cart-btn" class="text-xs uppercase tracking-wider text-neutral-400 hover:text-black">Close</button>
            </div>
            <ul id="cart-items-list" class="flex-1 overflow-y-auto divide-y divide-neutral-100 py-4"></ul>
            <div class="border-t border-neutral-200 pt-4">
                <div class="flex justify-between text-xs font-bold uppercase tracking-wider mb-6">
                    <span>Total Estimated</span>
                    <span id="cart-total-price">Ł0.00</span>
                </div>
                <button id="checkout-btn" class="w-full bg-black text-white text-[10px] font-bold tracking-[0.2em] uppercase py-4 hover:bg-neutral-800 transition-colors">
                    Secure Checkout via Stripe
                </button>
            </div>
        </div>
    </div>

    <div id="auth-sidebar" class="fixed inset-0 z-50 hidden">
        <div id="auth-overlay" class="absolute inset-0 bg-black/40 opacity-0 transition-opacity duration-300"></div>
        <div id="auth-panel" class="absolute right-0 top-0 w-full max-w-md h-full bg-white shadow-2xl p-6 flex flex-col translate-x-full transition-transform duration-300">
            <div class="flex justify-between items-center border-b border-neutral-100 pb-4">
                <h3 id="auth-title" class="text-xs font-bold uppercase tracking-widest">Identity Gateway</h3>
                <button id="close-auth-btn" class="text-xs uppercase tracking-wider text-neutral-400 hover:text-black">Close</button>
            </div>
            
            <div id="auth-form-container" class="mt-8 space-y-6">
                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Email Vector</label>
                    <input type="email" id="auth-email" class="w-full bg-neutral-50 border border-neutral-200 text-xs px-4 py-3 outline-none focus:border-black transition-colors" placeholder="enter email address">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-widest font-bold mb-2">Secure Password</label>
                    <input type="password" id="auth-password" class="w-full bg-neutral-50 border border-neutral-200 text-xs px-4 py-3 outline-none focus:border-black transition-colors" placeholder="••••••••">
                </div>
                <button id="auth-primary-action" class="w-full bg-black text-white text-[10px] font-bold tracking-widest uppercase py-4 hover:bg-neutral-800 transition-colors">
                    Access Account
                </button>
                <p class="text-center text-[11px] text-neutral-400 tracking-wide">
                    <button id="auth-toggle-mode" class="underline text-black font-bold">Create new profile matrix</button>
                </p>
            </div>

            <div id="auth-profile-container" class="mt-8 space-y-6 hidden">
                <div class="bg-neutral-50 border border-neutral-200/60 p-4">
                    <p class="text-[10px] uppercase tracking-widest text-neutral-400 font-bold">Authorized Account</p>
                    <p id="profile-email" class="text-xs font-bold mt-1 text-black"></p>
                    <p id="profile-tier" class="text-[9px] uppercase tracking-wider px-2 py-0.5 mt-2 bg-black text-white inline-block rounded-none"></p>
                </div>
                <button id="auth-logout-action" class="w-full bg-red-500/10 text-red-500 text-[10px] font-bold tracking-widest uppercase py-4 hover:bg-red-500/20 transition-colors">
                    Terminate Session
                </button>
            </div>
        </div>
    </div>

    <div id="closet-sidebar" class="fixed inset-0 z-50 hidden">
        <div id="closet-overlay" class="absolute inset-0 bg-black/40 opacity-0 transition-opacity duration-300"></div>
        <div id="closet-panel" class="absolute right-0 top-0 w-full max-w-lg h-full bg-white shadow-2xl p-6 flex flex-col translate-x-full transition-transform duration-300">
            <div class="flex justify-between items-center border-b border-neutral-100 pb-4">
                <h3 class="text-xs font-bold uppercase tracking-widest">Digital Closet Ledger</h3>
                <button id="close-closet-btn" class="text-xs uppercase tracking-wider text-neutral-400 hover:text-black">Close</button>
            </div>
            <div id="closet-assets-grid" class="flex-1 overflow-y-auto py-6 grid grid-cols-2 gap-4">
                </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
