<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyk Clothing | Official Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

    <nav class="bg-black text-white p-4 shadow-lg">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-widest uppercase">Nyk Clothing</h1>
            <button id="cart-btn" class="font-semibold hover:text-gray-300">Cart (0)</button>
        </div>
    </nav>

    <header class="py-20 text-center">
        <h2 class="text-5xl font-extrabold tracking-tight mb-4">The Sovereign Collection</h2>
        <p class="text-lg text-gray-600 mb-8">Premium quality. Built for the community.</p>
    </header>

    <main class="max-w-6xl mx-auto p-4">
        <div id="product-grid" class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <p class="text-center col-span-3 text-gray-500">Connecting to the vault...</p>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
